<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Junior K Adventure - Refined</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#c9a84c;--gold2:#f0d080;--gold3:#7a5a20;--neon:#39ff14;--danger:#ff3c00;--text:#d4e8c2;}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{width:100%;height:100%;overflow:hidden;}
        body{width:100%;height:100vh;height:100dvh;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:var(--text);position:fixed;inset:0;}
        #jbg{position:fixed;inset:0;z-index:0;background-image:radial-gradient(ellipse at center,transparent 20%,rgba(0,8,0,.82) 100%),url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=90&auto=format&fit=crop');background-size:cover;background-position:center;animation:bgZ 12s ease-in-out infinite alternate;}
        @keyframes bgZ{from{transform:scale(1)}to{transform:scale(1.07) translateY(-12px)}}
        #ff-canvas,#rain-canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}
        #rain-canvas{opacity:0;transition:opacity 1.2s;}
        #rain-canvas.on{opacity:1;}
        .screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s,transform .3s;}
        .screen.hidden{opacity:0;pointer-events:none;transform:scale(.97);}
        #stages-screen,#settings-screen,#lb-screen,#about-screen,#shop-screen{overflow-y:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;align-items:stretch;padding:16px 12px 60px;touch-action:pan-y;}
        #title-screen{background:rgba(0,6,0,.04);}
        .logo-tag{font-family:'Cinzel Decorative',serif;font-size:clamp(9px,2.2vw,14px);color:var(--gold);letter-spacing:8px;opacity:.75;text-align:center;}
        .logo-main{font-family:'Cinzel Decorative',serif;font-size:clamp(38px,10vw,110px);font-weight:900;line-height:1;text-align:center;background:linear-gradient(175deg,#fff5cc 0%,#f0d080 28%,#c9a84c 62%,#7a5a20 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 3px 28px rgba(201,168,76,.95));animation:lp 2.8s ease-in-out infinite;}
        .logo-sub{font-family:'Cinzel Decorative',serif;font-size:clamp(9px,2vw,14px);color:var(--gold);letter-spacing:14px;opacity:.72;margin-top:4px;text-align:center;}
        @keyframes lp{0%,100%{filter:drop-shadow(0 3px 28px rgba(201,168,76,.7))}50%{filter:drop-shadow(0 3px 55px rgba(201,168,76,1))}}
        .menu-wrap{margin-top:20px;display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;padding:0 16px;}
        .mbtn{width:clamp(220px,88vw,320px);padding:14px 20px;background:linear-gradient(135deg,rgba(6,22,6,.95),rgba(2,8,2,.98));border:1.5px solid var(--gold);border-radius:4px;color:var(--gold2);font-family:'Rajdhani',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all .18s;text-align:center;box-shadow:0 0 18px rgba(201,168,76,.18),inset 0 0 12px rgba(0,0,0,.6);-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
        .mbtn:hover{border-color:var(--gold2);box-shadow:0 0 36px rgba(201,168,76,.6);transform:translateY(-2px);}
        .mbtn:active{transform:scale(.94);}
        #coin-hud{position:fixed;top:10px;right:12px;z-index:300;background:rgba(0,0,0,.72);border:1.5px solid var(--gold);border-radius:24px;padding:6px 14px;display:flex;align-items:center;gap:6px;font-family:'Cinzel Decorative',serif;font-size:clamp(12px,2.2vw,16px);color:var(--gold2);}
        #hud{width:100%;padding:8px 12px;background:rgba(0,5,0,.94);border-bottom:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20;backdrop-filter:blur(10px);min-height:50px;}
        .hb{display:flex;flex-direction:column;align-items:center;min-width:55px;}
        .hl{font-size:7px;letter-spacing:3px;color:rgba(201,168,76,.5);text-transform:uppercase;}
        .hv{font-family:'Cinzel Decorative',serif;font-size:clamp(12px,2.4vw,18px);color:var(--gold2);}
        #game-screen{justify-content:flex-start;background:transparent;}
        #cw{position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        #gc{display:block;}
        #ov{position:absolute;inset:0;background:rgba(0,6,0,.88);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;opacity:0;pointer-events:none;transition:opacity .28s;padding:20px;}
        #ov.vis{opacity:1;pointer-events:all;}
        .ov-ttl{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,5.5vw,52px);color:var(--gold);margin-bottom:6px;text-align:center;}
        .mbtn.red{border-color:var(--danger);color:var(--danger);}
    </style>
</head>
<body>
    <div id="coin-hud">🪙 <span id="coin-display">0</span></div>
    <div id="jbg"></div>
    <canvas id="ff-canvas"></canvas>
    
    <div id="title-screen" class="screen">
        <div style="text-align:center;margin-bottom:6px;">
            <div class="logo-tag">◆ THE LEGENDARY SERPENT ◆</div>
            <div class="logo-main">JUNIOR K</div>
            <div class="logo-sub">A D V E N T U R E</div>
        </div>
        <div class="menu-wrap">
            <button class="mbtn" onclick="beginGame()">▶ &nbsp;QUICK START</button>
            <button class="mbtn" onclick="location.reload()">↺ &nbsp;RESET</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="hud">
            <div class="hb"><span class="hl">Score</span><span class="hv" id="hs">0</span></div>
            <div class="hb"><span class="hl">Coins</span><span class="hv" id="hcoins" style="color:#FFD700;">0</span></div>
            <div class="hbtns">
                <button class="mbtn" style="width:auto; padding:5px 15px;" onclick="quitGame()">✕ QUIT</button>
            </div>
        </div>
        <div id="cw">
            <canvas id="gc"></canvas>
            <div id="ov">
                <div class="ov-ttl" id="ovt">GAME OVER</div>
                <button class="mbtn" onclick="beginGame()">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        'use strict';
        const canvas = document.getElementById('gc');
        const ctx = canvas.getContext('2d');
        const gameScreen = document.getElementById('game-screen');
        const titleScreen = document.getElementById('title-screen');
        
        let snake, dir, food, score, coins = 0, dead = false;
        let CELL, COLS, ROWS, CW, CH;

        function resize() {
            CW = window.innerWidth;
            CH = window.innerHeight - 60; 
            canvas.width = CW;
            canvas.height = CH;
            // Increased grid density for a naturally "smaller" feel
            COLS = 30; 
            ROWS = Math.floor(CH / (CW / COLS));
            CELL = CW / COLS;
        }

        function beginGame() {
            resize();
            titleScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            document.getElementById('ov').classList.remove('vis');
            
            score = 0;
            dead = false;
            dir = { x: 1, y: 0 };
            
            // Snake starts smaller (length 2)
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 }
            ];
            
            spawnFood();
            gameLoop();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
        }

        function update() {
            if (dead) return;

            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Wall Collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            // Self Collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                coins += 5;
                document.getElementById('hs').innerText = score;
                document.getElementById('coin-display').innerText = coins;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // --- THE "SMALLER SNAKE" LOGIC ---
            // pad: how many pixels to "shrink" the snake inside its tile
            const pad = CELL * 0.25; 
            const snakeSize = CELL - (pad * 2);

            // Draw Food (Fruit)
            ctx.fillStyle = '#ff3c00';
            ctx.beginPath();
            ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/3, 0, Math.PI*2);
            ctx.fill();

            // Draw Snake
            snake.forEach((p, i) => {
                const isHead = i === 0;
                
                // Color Gradient for the body
                ctx.fillStyle = isHead ? '#f0d080' : '#1d6a09';
                
                // Draw rounded-style smaller rectangle
                ctx.fillRect(
                    p.x * CELL + pad, 
                    p.y * CELL + pad, 
                    snakeSize, 
                    snakeSize
                );

                // If it's the head, add a small eye/glow to keep it visible
                if(isHead) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(p.x * CELL + CELL/2, p.y * CELL + pad + 2, 2, 2);
                }
            });
        }

        function endGame() {
            dead = true;
            document.getElementById('ov').classList.add('vis');
        }

        function quitGame() {
            dead = true;
            gameScreen.classList.add('hidden');
            titleScreen.classList.remove('hidden');
        }

        function gameLoop() {
            if (dead) return;
            update();
            draw();
            setTimeout(gameLoop, 100); // Speed: 100ms
        }

        // Controls
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dir.y === 0) dir = { x: 0, y: -1 };
            if (e.key === 'ArrowDown' && dir.y === 0) dir = { x: 0, y: 1 };
            if (e.key === 'ArrowLeft' && dir.x === 0) dir = { x: -1, y: 0 };
            if (e.key === 'ArrowRight' && dir.x === 0) dir = { x: 1, y: 0 };
        });

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
